<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta charset="utf-8">
    <title>Spring Security Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body>
<div class="row text-white bg-dark m-0">
    <div class="col-1 ml-auto">
        <div sec:authorize="isAuthenticated()">
            <a class="nav-link" href="/logout">Logout</a>
        </div>
        <div sec:authorize="isAnonymous()">
            <a class="nav-link" href="#" th:href="@{/login}">Login</a>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="row" style="height: 100vh;">
        <div class="col bg-light">
            <div class="col" style="background-color: #e6e6e6;"><h3 id="pageTitle">All users</h3></div>
            <div class="col p-3" style="background-color: white;">
                <table class="table table-striped" id="userTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>User Name</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th class="admin-action">Edit</th>
                        <th class="admin-action">Delete</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <a id="btNew" class="btn btn-primary" onclick="addclick()">Add User</a>
        </div>
    </div>
</div>

<div id="myModal" class="modal fade in" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content" style="overflow-y: auto;">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <form class="col" id="frmEdit" onsubmit="return onSubmitAction(this)">
                    <div style="text-align: center;" class="col-8 mx-auto">
                        <div class="form-group row"><label class="col col-form-label"><strong>Id</strong></label><input class="form-control-plaintext border" name="id" type="text" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>User name</strong></label><input class="form-control-plaintext border" name="username" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>First name</strong></label><input class="form-control-plaintext border" name="firstName" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Last name</strong></label><input class="form-control-plaintext border" name="lastName" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Age</strong></label><input class="form-control-plaintext border" name="age" type="number"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Email</strong></label><input class="form-control-plaintext border" name="email" type="email"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Password</strong></label><input class="form-control-plaintext border" name="password" type="password"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Role</strong></label><select id="roled" multiple class="custom-select"></select></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                        <button class="btn btn-success" type="submit">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="delModal" class="modal fade in" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content" style="overflow-y: auto;">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <form class="col" id="frmDel" onsubmit="return onDelAction(this)">
                    <div style="text-align: center;" class="col-8 mx-auto">
                        <div class="form-group row"><label class="col col-form-label"><strong>Id</strong></label><input class="form-control-plaintext border" name="id" type="text" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>User name</strong></label><input class="form-control-plaintext border" name="username" type="text" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>First name</strong></label><input class="form-control-plaintext border" name="firstName" type="text" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Last name</strong></label><input class="form-control-plaintext border" name="lastName" type="text" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Age</strong></label><input class="form-control-plaintext border" name="age" readonly></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Email</strong></label><input class="form-control-plaintext border" name="email" type="text" readonly></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                        <button class="btn btn-danger" type="submit">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="addModal" class="modal fade in" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content" style="overflow-y: auto;">
            <div class="modal-header">
                <h5 class="modal-title">Add user</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <form class="col" id="frmAdd" onsubmit="return onNew(this)">
                    <div style="text-align: center;" class="col-8 mx-auto">
                        <div class="form-group row"><label class="col col-form-label"><strong>User name</strong></label><input class="form-control-plaintext border" name="username" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>First name</strong></label><input class="form-control-plaintext border" name="firstName" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Last name</strong></label><input class="form-control-plaintext border" name="lastName" type="text"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Age</strong></label><input class="form-control-plaintext border" name="age" type="number"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Email</strong></label><input class="form-control-plaintext border" name="email" type="email"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Password</strong></label><input class="form-control-plaintext border" name="password" type="password"></div>
                        <div class="form-group row"><label class="col col-form-label"><strong>Role</strong></label><select id="roles" multiple class="custom-select"></select></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                        <button class="btn btn-success" type="submit">Add new user</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
    const isUserPage = window.location.pathname === '/user';

    $(async function () {
        if (isUserPage) {
            document.getElementById('pageTitle').innerText = 'Current user';
            document.getElementById('btNew').style.display = 'none';
            document.querySelectorAll('.admin-action').forEach(el => el.style.display = 'none');
            await getCurrentUserTable();
        } else {
            await getUsersTable();
        }
    });

    function rolesToString(user) {
        return (user.roles || []).map(role => role.name).join(' ');
    }

    function userRow(user, withActions) {
        return `<tr>
            <td>${user.id || ''}</td>
            <td>${user.username || ''}</td>
            <td>${user.firstName || ''}</td>
            <td>${user.lastName || user.lastname || ''}</td>
            <td>${user.age || ''}</td>
            <td>${user.email || ''}</td>
            <td>${rolesToString(user)}</td>
            ${withActions ? `<td><a class="btn btn-success" onclick="edclick(${user.id})">Edit</a></td>
            <td><a class="btn btn-danger" onclick="delclick(${user.id})">Delete</a></td>` : ''}
        </tr>`;
    }

    async function getUsersTable() {
        const table = document.querySelector('#userTable tbody');
        const response = await fetch('/clients', {cache: 'no-store', headers: {'Pragma': 'no-cache'}});
        const users = await response.json();
        table.innerHTML = users.map(user => userRow(user, true)).join('');
    }

    async function getCurrentUserTable() {
        const table = document.querySelector('#userTable tbody');
        const response = await fetch('/authclient', {cache: 'no-store', headers: {'Pragma': 'no-cache'}});
        const user = await response.json();
        table.innerHTML = userRow(user, false);
    }

    async function loadRoles(selectId, userRoles = []) {
        const rolesSelect = document.getElementById(selectId);
        rolesSelect.innerHTML = '';
        const response = await fetch('/roles');
        const roles = await response.json();
        roles.forEach(role => {
            const option = document.createElement('option');
            option.value = role.id;
            option.textContent = role.name;
            option.selected = userRoles.some(userRole => userRole.id === role.id);
            rolesSelect.appendChild(option);
        });
    }

    function selectedRoles(selectId) {
        return Array.from(document.getElementById(selectId).selectedOptions)
            .map(option => ({id: Number(option.value)}));
    }

    async function edclick(id) {
        const form = document.getElementById('frmEdit');
        const response = await fetch('/client/' + id, {cache: 'no-store', headers: {'Pragma': 'no-cache'}});
        const user = await response.json();
        form.id.value = user.id;
        form.username.value = user.username || '';
        form.firstName.value = user.firstName || '';
        form.lastName.value = user.lastName || user.lastname || '';
        form.age.value = user.age || '';
        form.email.value = user.email || '';
        form.password.value = '';
        await loadRoles('roled', user.roles || []);
        $('#myModal').modal({backdrop: 'static', keyboard: true}, 'show');
        return false;
    }

    async function onSubmitAction(elem) {
        const id = elem.id.value;
        await fetch('/client/' + id, {
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            method: 'PUT',
            body: JSON.stringify({
                id: Number(id),
                username: elem.username.value,
                firstName: elem.firstName.value,
                lastName: elem.lastName.value,
                age: elem.age.value,
                email: elem.email.value,
                password: elem.password.value,
                roles: selectedRoles('roled')
            })
        });
        $('#myModal').modal('hide');
        await getUsersTable();
        return false;
    }

    async function delclick(id) {
        const form = document.getElementById('frmDel');
        const response = await fetch('/client/' + id, {cache: 'no-store', headers: {'Pragma': 'no-cache'}});
        const user = await response.json();
        form.id.value = user.id;
        form.username.value = user.username || '';
        form.firstName.value = user.firstName || '';
        form.lastName.value = user.lastName || user.lastname || '';
        form.age.value = user.age || '';
        form.email.value = user.email || '';
        $('#delModal').modal({backdrop: 'static', keyboard: true}, 'show');
        return false;
    }

    async function onDelAction(elem) {
        await fetch('/delete/' + elem.id.value, {method: 'DELETE'});
        $('#delModal').modal('hide');
        await getUsersTable();
        return false;
    }

    async function addclick() {
        document.getElementById('frmAdd').reset();
        await loadRoles('roles');
        $('#addModal').modal({backdrop: 'static', keyboard: true}, 'show');
        return false;
    }

    async function onNew(elem) {
        await fetch('/client', {
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            method: 'POST',
            body: JSON.stringify({
                username: elem.username.value,
                firstName: elem.firstName.value,
                lastName: elem.lastName.value,
                age: elem.age.value,
                email: elem.email.value,
                password: elem.password.value,
                roles: selectedRoles('roles')
            })
        });
        $('#addModal').modal('hide');
        await getUsersTable();
        return false;
    }
</script>
</body>
</html>
